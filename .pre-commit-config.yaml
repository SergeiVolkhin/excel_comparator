# See https://pre-commit.com for usage
#
# Install once per clone:
#   pip install pre-commit && pre-commit install
#
# Run manually against all files:
#   pre-commit run --all-files

default_language_version:
  python: python3.13

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=100"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.1
    hooks:
      - id: mypy
        files: ^src/
        exclude: ^src/gui/
        additional_dependencies:
          - pydantic>=2.13
          - pydantic-settings>=2.13
          - pandas-stubs
          - types-python-dateutil

  # Smoke test: run on git push only (not every commit). Uses the project
  # venv explicitly so hypothesis / pytest-cov / etc are available.
  # Invoke manually with:
  #   pre-commit run --hook-stage pre-push pytest-smoke --all-files
  - repo: local
    hooks:
      - id: pytest-smoke
        name: pytest (smoke, excl. benchmarks)
        entry: python -m pytest tests/ -q --ignore=tests/test_benchmarks.py -x
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]
